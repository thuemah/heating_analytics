import_from_csv:
  name: Import from CSV
  description: Import historical data from a CSV file into the learning model.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to import into. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path to the CSV file on the server.
      required: true
      selector:
        text:
    column_mapping:
      name: Column Mapping
      description: JSON object mapping CSV column names to 'timestamp', 'energy', 'temperature', 'wind_speed', and optionally 'wind_gust', 'cloud_coverage' and 'is_auxiliary'.
      required: true
      selector:
        object:
    update_model:
      name: Update Learning Model
      description: >-
        Controls whether the imported data is used to train the energy consumption model.
        true (default): imports data into history/graphs AND trains the correlation model — use this for a full cold-start import.
        false: imports data into history and graphs ONLY, leaving your existing learned model completely untouched.
        Set to false when filling in missing historical periods (e.g. weather reference data for the Model Comparison sensor) so that the import does not overwrite correlations your model has already learned from live data.
      default: true
      selector:
        boolean:

export_to_csv:
  name: Export to CSV
  description: Export data (Daily History or Hourly Log) to a CSV file.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to export from. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path where the CSV file will be saved (e.g., /config/heating_data.csv).
      required: true
      selector:
        text:
    export_type:
      name: Export Type
      description: Type of data to export ('daily' or 'hourly').
      required: true
      selector:
        select:
          options:
            - daily
            - hourly

retrain_from_history:
  name: Retrain Model from History
  description: >-
    Retrains the learning model using the existing hourly log — no CSV file required.
    In Track A mode (standard hourly learning), each logged hour is replayed through
    the same per-hour EMA path used during live operation.
    In Track B mode (Daily Learning Mode), hours are grouped by calendar day and the
    same nightly batch EMA is applied; thermal mass correction is applied automatically
    when an Indoor Temperature Sensor is configured and indoor_temp values are present
    in the log.
    Useful after changing learning_rate, balance_point, wind thresholds, or after a
    manual model reset.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to retrain. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    days_back:
      name: Days Back
      description: Limit retraining to the most recent N days of logged data. Leave empty to use all available history (up to 90 days in log).
      selector:
        number:
          min: 1
          max: 730
          mode: box
    reset_first:
      name: Reset Model First
      description: >-
        If true, clears all existing learned correlation data and the U-coefficient before
        retraining. Use this for a full cold-start rebuild from history.
        If false (default), retraining refines the existing model via EMA.
      default: false
      selector:
        boolean:
    experimental_cop_smear:
      name: COP-Weighted Smearing (experimental)
      description: >-
        For Track B installations with MPC COP parameters available: distributes
        daily energy across 24 hours using per-hour COP weights instead of flat
        q/24. Produces up to 24 temperature buckets per day instead of one.
        Requires heatpump_mpc integration with get_cop_params service.
        No effect on Track A or Track C.
      default: false
      selector:
        boolean:

reset_learning_data:
  name: Reset Learning Data
  description: Reset all learned correlation data and start fresh. If no entity is selected the first available instance is targeted.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to reset. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics

reset_forecast_accuracy:
  name: Reset Forecast Accuracy
  description: Reset the forecast accuracy tracking history (forecast vs actual). This clears the "Forecast History" tab but preserves energy logs. If no entity is selected the first available instance is targeted.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to reset. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics

backup_data:
  name: Full System Backup
  description: Create a full backup of the system state (Learning Model, History, Logs, Settings) to a JSON file.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to back up. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path where the backup JSON file will be saved (e.g., /config/heating_backup.json).
      required: true
      selector:
        text:

restore_data:
  name: Full System Restore
  description: "Restore the system state from a full backup JSON file. WARNING: This will overwrite all current data for the targeted instance!"
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to restore into. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path to the backup JSON file.
      required: true
      selector:
        text:

reset_unit_learning_data:
  name: Reset Unit Learning Data
  description: Reset the learned correlation model for a specific heating unit. This forces the unit back into 'Cold Start' mode, allowing buffered data to be applied or new data to be collected.
  fields:
    entity_id:
      name: Entity
      description: The heating unit energy sensor to reset (e.g., sensor.heating_floor_energy).
      required: true
      selector:
        entity:
          domain: sensor

replace_sensor_source:
  name: Replace Sensor Source
  description: Replace a heating unit's energy sensor with a new one, migrating all historical data and learning models to the new entity ID.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to update. Leave empty to apply to all instances that contain the old sensor.
      selector:
        entity:
          integration: heating_analytics
    old_entity_id:
      name: Old Entity
      description: The entity ID of the old energy sensor to be replaced (e.g., sensor.old_heater).
      required: true
      selector:
        entity:
          domain: sensor
    new_entity_id:
      name: New Entity
      description: The entity ID of the new energy sensor (e.g., sensor.new_heater).
      required: true
      selector:
        entity:
          domain: sensor

compare_periods:
  name: Compare Periods
  description: "Compare two historical periods. Period 1 is the current/recent period, Period 2 is the reference/baseline. Deltas show P1 relative to P2 (positive = P1 is higher)."
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to compare. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    period_1_start:
      name: Period 1 Start (Current)
      description: "Start date for the current/recent period (e.g., '2026-01-01')."
      required: true
      selector:
        date:
    period_1_end:
      name: Period 1 End (Current)
      description: "End date for the current/recent period (e.g., '2026-01-31')."
      required: true
      selector:
        date:
    period_2_start:
      name: Period 2 Start (Reference)
      description: "Start date for the reference/baseline period (e.g., '2025-01-01')."
      required: true
      selector:
        date:
    period_2_end:
      name: Period 2 End (Reference)
      description: "End date for the reference/baseline period (e.g., '2025-01-31')."
      required: true
      selector:
        date:

reset_solar_learning:
  name: Reset Solar Learning
  description: >-
    Reset the learned solar coefficients for a specific unit or all units
    within an instance. Optionally refit coefficients from the stored hourly
    log immediately after reset — a "solar-only retrain" that leaves the
    base model and U-coefficient untouched.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to reset. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    unit_entity_id:
      name: Unit Sensor (optional)
      description: The energy sensor to reset solar learning for. Leave empty to reset all units in the instance.
      selector:
        entity:
          domain: sensor
    replay_from_history:
      name: Refit from History
      description: >-
        After resetting, replay the stored hourly log through the NLMS
        learner so coefficients are refitted against the existing base
        model. Use when the base has stabilised but solar coefficients
        are known to be wrong (e.g. after changing screen config, or
        when diagnose_solar shows large implied-vs-learned divergence).
        Base, aux, and U-coefficient tables are NOT touched.
      default: false
      selector:
        boolean:
    days_back:
      name: Days Back (optional)
      description: Limit the NLMS replay to the most recent N days of logged data. Only applies when Refit from History is enabled. Leave empty to use all available history.
      selector:
        number:
          min: 1
          max: 730
          mode: box

batch_fit_solar:
  name: Batch-Fit Solar Coefficients
  description: >-
    Run a periodic batch least-squares fit on per-unit solar coefficients
    over the modulating-regime hourly log.  Bridges the mild-weather
    catch-22 where online learning (NLMS + inequality) produces zero net
    signal because expected base demand is near zero — typically west-
    facing rooms whose solar peak coincides with the daily temperature
    maximum.  Each (unit, mode) regime is fit independently; saturated
    and shutdown samples are excluded.  Result is damped against the
    existing coefficient (factor 0.3) so a single noisy batch cannot
    overshoot.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to target. Leave empty for the first available instance.
      selector:
        entity:
          integration: heating_analytics
    unit_entity_id:
      name: Unit Sensor (optional)
      description: Restrict the batch fit to a single energy sensor. Leave empty to fit all units in the instance.
      selector:
        entity:
          domain: sensor
    days_back:
      name: Days of History
      description: >-
        Restrict the fit to the last N days of the hourly log.  Default 30.
        Recommended after a major release: a 14- or 30-day window fits
        against representative post-upgrade data instead of being pulled
        toward old model behaviour by pre-upgrade entries.  Increase only
        if you specifically want to absorb older data (e.g. cross-seasonal).
      default: 30
      selector:
        number:
          min: 1
          max: 730
          mode: box
    dry_run:
      name: Dry Run (preview only)
      description: >-
        When enabled, run every gate and the LS solve but do NOT write the
        coefficients back.  The response carries the would-be result per
        (unit, regime) so you can preview before committing.  Useful for
        sanity-checking an unfamiliar window before letting the fit drift
        live state.
      default: false
      selector:
        boolean:
    seed_live_window:
      name: Seed live Tobit window from batch samples
      description: >-
        When enabled (and not in dry-run), populate the live Tobit
        sliding window with the same samples used by this batch fit.
        Use this after a classification change (e.g. shutdown-detection
        gate fix) to migrate Tobit's live state without a 25-day cold-
        start.  Without this flag, Tobit's existing window keeps its
        old samples and continues writing from them; with this flag
        the window is rebuilt from the batch fit's correctly-classified
        samples and Tobit's next qualifying hour refines from there.
        Defaults off — opt-in only.
      default: false
      selector:
        boolean:

apply_implied_coefficient:
  name: Apply Implied Solar Coefficient
  description: >-
    Write diagnose_solar's implied LS-fit into the live solar coefficient
    for one (unit, mode) regime.  Useful when an installation cannot
    produce a usable coefficient via the online learners — typically
    Track C / MPC-managed sensors which have no coherent dark-equivalent
    baseline, so NLMS / inequality / batch_fit_solar all skip them and
    they're stuck on default coefficients.

    Per-direction stability guard: each direction (S, E, W) is evaluated
    across the diagnose stability windows.  A direction with sign-flip
    or a max/min spread above the threshold is skipped (current value
    preserved); only stable directions are written.  ``force: true``
    overrides the per-direction guard — use only after manually verifying
    the implied is trustworthy.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to target. Leave empty for the first available instance.
      selector:
        entity:
          integration: heating_analytics
    unit_entity_id:
      name: Unit Sensor
      description: The energy sensor whose coefficient you want to apply. Required.
      selector:
        entity:
          domain: sensor
    mode:
      name: Mode Regime
      description: >-
        Which regime to write to: ``heating`` (default) or ``cooling``.
        Guest modes are excluded — guest hours are filtered out at the
        sample collector, so applying to guest_heating / guest_cooling
        would always return no_data.  OFF and DHW have no learnable
        solar regime and are also excluded.
      default: heating
      selector:
        select:
          options:
            - heating
            - cooling
    days_back:
      name: Days of History
      description: >-
        Restrict the implied LS fit to the last N days of the hourly
        log.  Default 30, minimum 7.  Recommended after a retrain or
        upgrade — a 14- or 30-day window fits against representative
        current-state data instead of being pulled by older entries
        that reflect a previous model state.  Compare ``days_back: 7``
        vs ``days_back: 30`` (with ``dry_run: true`` both times) to
        spot-check whether recent data agrees with the longer window;
        large divergence indicates older data is dragging the fit and
        the recent window should be trusted.

        The 7-day floor is deliberate: stability windows split samples
        chronologically into 3 chunks, and ``days_back < 7`` would
        place all chunks within a single solar phase (e.g. one sunny
        afternoon), letting within-phase noise pass as "stable".
        Users who want a tighter window must set the coefficient
        manually.
      default: 30
      selector:
        number:
          min: 7
          max: 730
          mode: box
    dry_run:
      name: Dry Run (preview only)
      description: >-
        When enabled, run the analysis pass and return what *would* be
        applied per direction without actually writing.  Inspect the
        ``stability`` block in the response to see why directions were
        skipped.  Useful for sanity-checking before committing.
      default: false
      selector:
        boolean:
    force:
      name: Force (override per-direction stability guard)
      description: >-
        When enabled, write every direction's implied value even when
        the stability guard would normally skip it.  Use only when you
        have manually verified the implied is the right answer for a
        noisy direction (e.g. you know the house has no west-facing
        windows so the noisy west signal can be safely set to zero or
        whatever the implied says).
      default: false
      selector:
        boolean:

exit_cooldown:
  name: Exit Auxiliary Cooldown
  description: Manually force the system to exit the auxiliary cooldown/decay state. Use this if you want to resume normal model learning immediately after an auxiliary event, bypassing the thermal settling period.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to affect. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics

get_forecast:
  name: Get Forecast Data
  description: Returns detailed hourly forecast data for the specified duration. Response variable contains a list of hourly objects.
  fields:
    entity_id:
      name: Entity
      description: The Heating Analytics sensor to target (optional, defaults to primary instance).
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days
      description: Number of days to forecast (1-14).
      default: 1
      selector:
        number:
          min: 1
          max: 14
          mode: box
    isolate_sensor:
      name: Isolate Sensor
      description: >-
        Energy sensor entity_id to isolate the forecast for. When set, each
        hourly entry returns max(0, global − Σ other units) — the demand that
        the target sensor must cover. Designed for MPC integrations that need
        their unit's share only, not the building total.
      selector:
        entity:
          domain: sensor

calibrate_wind_thresholds:
  name: Calibrate Wind Thresholds
  description: Tests historical data to calculate the optimal wind thresholds (high wind and extreme wind) by reclassifying historical hours and comparing existing model expected consumption against actual consumption to minimize Mean Absolute Error (MAE). Returns recommended thresholds.
  fields:
    entity_id:
      name: Entity
      description: The Heating Analytics sensor to target (optional, defaults to primary instance).
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of historical data to evaluate (1-180).
      default: 60
      selector:
        number:
          min: 1
          max: 180
          mode: box

calibrate_unit_thresholds:
  name: Calibrate Per-Unit Min-Base Thresholds
  description: >-
    Recomputes each sensor's solar-learning noise-floor threshold from
    dark-hour (solar_factor < 0.05) heating-mode actuals.  Replaces
    the global 0.15 kWh fallback with a per-unit p10 value, allowing small
    loads and low-min-modulation heat pumps to participate in NLMS,
    inequality, and shutdown-detection gates at their own calibrated
    noise floor.  Safety guards:  requires 14+ days of log data and 20+
    dark-hour samples per unit, clamps to [0.03, 0.30] kWh, limits change
    to ±50 % per run.  Runs automatically at every startup — this service
    is for on-demand recalibration.
  fields:
    entity_id:
      name: Entity
      description: The Heating Analytics sensor to target (optional, defaults to primary instance).
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of historical dark-hour data to evaluate (7-180).
      default: 30
      selector:
        number:
          min: 7
          max: 180
          mode: box

calibrate_inertia:
  name: Calibrate Thermal Inertia
  description: "Tests historical data to find the ideal thermal inertia (tau, 1-24h) for your house. Primary result uses a causal exponential decay kernel (matching the coordinator's RC-circuit model) — set your config-flow slider to recommended_tau. Gaussian sweep is included as a comparison. Returns results as a response."
  fields:
    entity_id:
      name: Entity
      description: The Heating Analytics sensor to target (optional, defaults to primary instance).
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of historical data to evaluate (1-90).
      default: 30
      selector:
        number:
          min: 1
          max: 90
          mode: box
    centered_energy_average:
      name: Centered Energy Average
      description: Smoothes the hourly energy consumption using a 3-hour centered moving average before calculating correlation. This helps reduce noise from heat pump defrost cycles or partial hour delays.
      default: false
      selector:
        boolean:
    test_asymmetric:
      name: Test Asymmetric Inertia
      description: Also evaluates an asymmetric inertia model that uses a slow profile (4h) when outdoor temperature is falling (heat shedding) and a fast profile (2h) when rising (heat gaining). Returns comparative R² and RMSE alongside the standard symmetric results.
      default: false
      selector:
        boolean:
    test_delta_t_scaling:
      name: "Test ΔT-dependent Inertia Scaling"
      description: "Tests whether optimal thermal inertia grows with the temperature differential (balance_point − outdoor_temp). Bins pure hours into 5°C ΔT buckets and finds the best exponential τ per bin (window=min(5τ, 168)). Results carry best_tau instead of best_hours. A monotonic trend (low ΔT → short τ, high ΔT → long τ) supports using a ΔT-scaled inertia model."
      default: false
      selector:
        boolean:
    test_exponential_kernel:
      name: Extended Tau Sweep (1–72h)
      description: "Runs an extended exponential sweep beyond the standard 1-24h range, covering τ = 1, 2, 3, 4, 6, 8, 12, 18, 24, 36, 48, 72 hours. Useful for exploring whether a very large time constant improves fit for heavy-mass buildings. Results are returned under extended_tau_sweep."
      default: false
      selector:
        boolean:

diagnose_model:
  name: Diagnose Model
  description: >-
    Analyzes the learned correlation model and hourly history for data quality
    issues. Reports monotonicity violations, bucket population, mode
    contamination, solar correlation, and per-day Track B/C diagnostics.
    Returns a diagnostic dict — inspect in Developer Tools → Services.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance to diagnose. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of hourly log history to include in the analysis (1-365).
      default: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box

diagnose_solar:
  name: Diagnose Solar Model
  description: >-
    Analyzes per-unit solar coefficient health and global solar model quality.
    Reports implied coefficients, convergence stability, battery decay health,
    screen correction impact, temporal bias, and saturation frequency.
    Includes battery decay calibration sweep — set apply_battery_decay to
    automatically apply the recommended decay rate.
    Returns a diagnostic dict — inspect in Developer Tools → Services.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance to diagnose. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of hourly log history to include in the analysis (1-365).
      default: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box
    apply_battery_decay:
      name: Apply Recommended Battery Decay
      description: >-
        When enabled, automatically applies the recommended battery decay rate
        from the calibration sweep. The value is persisted and takes effect
        immediately. Use diagnose_solar without this flag first to review the
        recommendation.
      default: false
      selector:
        boolean:

set_experimental_tobit_live_learner:
  name: Set Tobit Live Learner Flag
  description: >-
    Toggle the master flag for the Tobit live coefficient learner.
    Default is enabled on 1.3.5+ — pass enabled=false to opt out
    and revert to NLMS-only learning across all entities.  The
    disable persists across restarts.  Setting this true requires
    confirm=true to acknowledge the model change.  When enabled,
    an automatic plausibility-gate decides per entity whether Tobit
    writes the live coefficient — see set_tobit_live_entities for
    optional scope-restriction.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to target. Leave empty for the first available instance.
      selector:
        entity:
          integration: heating_analytics
    enabled:
      name: Enabled
      description: True to enable the Tobit live-learner master flag, false to disable.
      required: true
      selector:
        boolean:
    confirm:
      name: Confirm Activation
      description: >-
        Required when enabled=true.  Pass true to acknowledge that
        the Tobit learner replaces NLMS as the primary writer for
        plausibility-passing entities.
      default: false
      selector:
        boolean:

set_tobit_live_entities:
  name: Set Tobit Live Scope
  description: >-
    Optional scope-override for the Tobit live code path.  Default
    is auto-mode (empty list) — when the master flag is enabled,
    every eligible entity is a candidate and the automatic
    plausibility-gate decides per entity whether Tobit writes (noise
    loads are blocked, legitimate VPs pass through).  Pass a
    non-empty list to scope-restrict Tobit to ONLY those entities;
    entities outside the list keep using NLMS regardless of the
    plausibility-gate.  The plausibility-gate still applies within
    the scope — explicitly allow-listing an entity does not bypass
    the noise-load filter.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to target. Leave empty for the first available instance.
      selector:
        entity:
          integration: heating_analytics
    entities:
      name: Scope-restrict to these Energy Sensors
      description: >-
        Optional.  Empty list = auto-mode (every eligible entity
        candidates Tobit, plausibility-gate decides).  Non-empty
        list = scope-restrict to listed entities only; others stay
        on NLMS.  The plausibility-gate still applies — auto-mode
        already filters noise loads, so most installs do not need
        an explicit scope.
      required: true
      selector:
        entity:
          domain: sensor
          multiple: true

reset_tobit_live_state:
  name: Reset Tobit Live State
  description: >-
    Clear the running sufficient-statistic for one or all entities.
    Without unit_entity_id: clears state for every entity.  With
    unit_entity_id: clears state for that single entity only.
    Coefficient values in solar_coefficients_per_unit are NOT touched;
    use reset_solar_learning for that.  After this call the live
    learner enters cold-start (NLMS-fallback covers until n_eff
    rebuilds).
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to target. Leave empty for the first available instance.
      selector:
        entity:
          integration: heating_analytics
    unit_entity_id:
      name: Unit Sensor
      description: >-
        Optional energy sensor to reset.  Leave empty to clear state
        for all entities.
      selector:
        entity:
          domain: sensor
