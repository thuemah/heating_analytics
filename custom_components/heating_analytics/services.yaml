import_from_csv:
  name: Import from CSV
  description: Import historical data from a CSV file into the learning model.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to import into. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path to the CSV file on the server.
      required: true
      selector:
        text:
    column_mapping:
      name: Column Mapping
      description: JSON object mapping CSV column names to 'timestamp', 'energy', 'temperature', 'wind_speed', and optionally 'wind_gust', 'cloud_coverage' and 'is_auxiliary'.
      required: true
      selector:
        object:
    update_model:
      name: Update Learning Model
      description: >-
        Controls whether the imported data is used to train the energy consumption model.
        true (default): imports data into history/graphs AND trains the correlation model — use this for a full cold-start import.
        false: imports data into history and graphs ONLY, leaving your existing learned model completely untouched.
        Set to false when filling in missing historical periods (e.g. weather reference data for the Model Comparison sensor) so that the import does not overwrite correlations your model has already learned from live data.
      default: true
      selector:
        boolean:

export_to_csv:
  name: Export to CSV
  description: Export data (Daily History or Hourly Log) to a CSV file.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to export from. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path where the CSV file will be saved (e.g., /config/heating_data.csv).
      required: true
      selector:
        text:
    export_type:
      name: Export Type
      description: Type of data to export ('daily' or 'hourly').
      required: true
      selector:
        select:
          options:
            - daily
            - hourly

retrain_from_history:
  name: Retrain Model from History
  description: >-
    Retrains the learning model using the existing hourly log — no CSV file required.
    In Track A mode (standard hourly learning), each logged hour is replayed through
    the same per-hour EMA path used during live operation.
    In Track B mode (Daily Learning Mode), hours are grouped by calendar day and the
    same nightly batch EMA is applied; thermal mass correction is applied automatically
    when an Indoor Temperature Sensor is configured and indoor_temp values are present
    in the log.
    Useful after changing learning_rate, balance_point, wind thresholds, or after a
    manual model reset.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to retrain. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    days_back:
      name: Days Back
      description: Limit retraining to the most recent N days of logged data. Leave empty to use all available history (up to 90 days in log).
      selector:
        number:
          min: 1
          max: 730
          mode: box
    reset_first:
      name: Reset Model First
      description: >-
        If true, clears all existing learned correlation data and the U-coefficient before
        retraining. Use this for a full cold-start rebuild from history.
        If false (default), retraining refines the existing model via EMA.
      default: false
      selector:
        boolean:
    experimental_cop_smear:
      name: COP-Weighted Smearing (experimental)
      description: >-
        For Track B installations with MPC COP parameters available: distributes
        daily energy across 24 hours using per-hour COP weights instead of flat
        q/24. Produces up to 24 temperature buckets per day instead of one.
        Requires heatpump_mpc integration with get_cop_params service.
        No effect on Track A or Track C.
      default: false
      selector:
        boolean:

reset_learning_data:
  name: Reset Learning Data
  description: Reset all learned correlation data and start fresh. If no entity is selected the first available instance is targeted.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to reset. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics

reset_forecast_accuracy:
  name: Reset Forecast Accuracy
  description: Reset the forecast accuracy tracking history (forecast vs actual). This clears the "Forecast History" tab but preserves energy logs. If no entity is selected the first available instance is targeted.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to reset. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics

backup_data:
  name: Full System Backup
  description: Create a full backup of the system state (Learning Model, History, Logs, Settings) to a JSON file.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to back up. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path where the backup JSON file will be saved (e.g., /config/heating_backup.json).
      required: true
      selector:
        text:

restore_data:
  name: Full System Restore
  description: "Restore the system state from a full backup JSON file. WARNING: This will overwrite all current data for the targeted instance!"
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to restore into. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    file_path:
      name: File path
      description: The absolute path to the backup JSON file.
      required: true
      selector:
        text:

reset_unit_learning_data:
  name: Reset Unit Learning Data
  description: Reset the learned correlation model for a specific heating unit. This forces the unit back into 'Cold Start' mode, allowing buffered data to be applied or new data to be collected.
  fields:
    entity_id:
      name: Entity
      description: The heating unit energy sensor to reset (e.g., sensor.heating_floor_energy).
      required: true
      selector:
        entity:
          domain: sensor

replace_sensor_source:
  name: Replace Sensor Source
  description: Replace a heating unit's energy sensor with a new one, migrating all historical data and learning models to the new entity ID.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to update. Leave empty to apply to all instances that contain the old sensor.
      selector:
        entity:
          integration: heating_analytics
    old_entity_id:
      name: Old Entity
      description: The entity ID of the old energy sensor to be replaced (e.g., sensor.old_heater).
      required: true
      selector:
        entity:
          domain: sensor
    new_entity_id:
      name: New Entity
      description: The entity ID of the new energy sensor (e.g., sensor.new_heater).
      required: true
      selector:
        entity:
          domain: sensor

compare_periods:
  name: Compare Periods
  description: "Compare two historical periods. Period 1 is the current/recent period, Period 2 is the reference/baseline. Deltas show P1 relative to P2 (positive = P1 is higher)."
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to compare. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    period_1_start:
      name: Period 1 Start (Current)
      description: "Start date for the current/recent period (e.g., '2026-01-01')."
      required: true
      selector:
        date:
    period_1_end:
      name: Period 1 End (Current)
      description: "End date for the current/recent period (e.g., '2026-01-31')."
      required: true
      selector:
        date:
    period_2_start:
      name: Period 2 Start (Reference)
      description: "Start date for the reference/baseline period (e.g., '2025-01-01')."
      required: true
      selector:
        date:
    period_2_end:
      name: Period 2 End (Reference)
      description: "End date for the reference/baseline period (e.g., '2025-01-31')."
      required: true
      selector:
        date:

reset_solar_learning:
  name: Reset Solar Learning
  description: Reset the learned solar coefficients for a specific unit or all units within an instance.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance you want to reset. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    unit_entity_id:
      name: Unit Sensor (optional)
      description: The energy sensor to reset solar learning for. Leave empty to reset all units in the instance.
      selector:
        entity:
          domain: sensor

exit_cooldown:
  name: Exit Auxiliary Cooldown
  description: Manually force the system to exit the auxiliary cooldown/decay state. Use this if you want to resume normal model learning immediately after an auxiliary event, bypassing the thermal settling period.
  fields:
    entity_id:
      name: Entity
      description: A Heating Analytics sensor belonging to the instance you want to affect. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics

get_forecast:
  name: Get Forecast Data
  description: Returns detailed hourly forecast data for the specified duration. Response variable contains a list of hourly objects.
  fields:
    entity_id:
      name: Entity
      description: The Heating Analytics sensor to target (optional, defaults to primary instance).
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days
      description: Number of days to forecast (1-14).
      default: 1
      selector:
        number:
          min: 1
          max: 14
          mode: box
    isolate_sensor:
      name: Isolate Sensor
      description: >-
        Energy sensor entity_id to isolate the forecast for. When set, each
        hourly entry returns max(0, global − Σ other units) — the demand that
        the target sensor must cover. Designed for MPC integrations that need
        their unit's share only, not the building total.
      selector:
        entity:
          domain: sensor

calibrate_wind_thresholds:
  name: Calibrate Wind Thresholds
  description: Tests historical data to calculate the optimal wind thresholds (high wind and extreme wind) by reclassifying historical hours and comparing existing model expected consumption against actual consumption to minimize Mean Absolute Error (MAE). Returns recommended thresholds.
  fields:
    entity_id:
      name: Entity
      description: The Heating Analytics sensor to target (optional, defaults to primary instance).
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of historical data to evaluate (1-180).
      default: 60
      selector:
        number:
          min: 1
          max: 180
          mode: box

calibrate_inertia:
  name: Calibrate Thermal Inertia
  description: "Tests historical data to find the ideal thermal inertia (tau, 1-24h) for your house. Primary result uses a causal exponential decay kernel (matching the coordinator's RC-circuit model) — set your config-flow slider to recommended_tau. Gaussian sweep is included as a comparison. Returns results as a response."
  fields:
    entity_id:
      name: Entity
      description: The Heating Analytics sensor to target (optional, defaults to primary instance).
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of historical data to evaluate (1-90).
      default: 30
      selector:
        number:
          min: 1
          max: 90
          mode: box
    centered_energy_average:
      name: Centered Energy Average
      description: Smoothes the hourly energy consumption using a 3-hour centered moving average before calculating correlation. This helps reduce noise from heat pump defrost cycles or partial hour delays.
      default: false
      selector:
        boolean:
    test_asymmetric:
      name: Test Asymmetric Inertia
      description: Also evaluates an asymmetric inertia model that uses a slow profile (4h) when outdoor temperature is falling (heat shedding) and a fast profile (2h) when rising (heat gaining). Returns comparative R² and RMSE alongside the standard symmetric results.
      default: false
      selector:
        boolean:
    test_delta_t_scaling:
      name: "Test ΔT-dependent Inertia Scaling"
      description: "Tests whether optimal thermal inertia grows with the temperature differential (balance_point − outdoor_temp). Bins pure hours into 5°C ΔT buckets and finds the best exponential τ per bin (window=min(5τ, 168)). Results carry best_tau instead of best_hours. A monotonic trend (low ΔT → short τ, high ΔT → long τ) supports using a ΔT-scaled inertia model."
      default: false
      selector:
        boolean:
    test_exponential_kernel:
      name: Extended Tau Sweep (1–72h)
      description: "Runs an extended exponential sweep beyond the standard 1-24h range, covering τ = 1, 2, 3, 4, 6, 8, 12, 18, 24, 36, 48, 72 hours. Useful for exploring whether a very large time constant improves fit for heavy-mass buildings. Results are returned under extended_tau_sweep."
      default: false
      selector:
        boolean:

diagnose_model:
  name: Diagnose Model
  description: >-
    Analyzes the learned correlation model and hourly history for data quality
    issues. Reports monotonicity violations, bucket population, mode
    contamination, solar correlation, and per-day Track B/C diagnostics.
    Returns a diagnostic dict — inspect in Developer Tools → Services.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance to diagnose. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of hourly log history to include in the analysis (1-365).
      default: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box

diagnose_solar:
  name: Diagnose Solar Model
  description: >-
    Analyzes per-unit solar coefficient health and global solar model quality.
    Reports implied coefficients, convergence stability, battery decay health,
    screen correction impact, temporal bias, and saturation frequency.
    Includes battery decay calibration sweep — set apply_battery_decay to
    automatically apply the recommended decay rate.
    Returns a diagnostic dict — inspect in Developer Tools → Services.
  fields:
    entity_id:
      name: Instance
      description: A Heating Analytics sensor belonging to the instance to diagnose. Leave empty to target the first available instance.
      selector:
        entity:
          integration: heating_analytics
    days:
      name: Days Back to Analyze
      description: Number of days of hourly log history to include in the analysis (1-365).
      default: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box
    apply_battery_decay:
      name: Apply Recommended Battery Decay
      description: >-
        When enabled, automatically applies the recommended battery decay rate
        from the calibration sweep. The value is persisted and takes effect
        immediately. Use diagnose_solar without this flag first to review the
        recommendation.
      default: false
      selector:
        boolean:
