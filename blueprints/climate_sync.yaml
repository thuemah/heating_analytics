blueprint:
  name: Heating Analytics - Climate State Sync
  description: >
    Synchronizes climate entity states (heat/cool/off) to a Heating Analytics
    mode select helper. Supports both standard and guest mode tracking.

    State mapping (v2):

      heat, heat_cool, auto    →  heating  (active heating intent)
      cool                     →  cooling  (active cooling intent)
      off:
        - guest mode           →  off      (guest left, no demand)
        - standard mode        →  preserve (do nothing — see below)
      dry, fan_only            →  preserve (small load, neither heat nor cool)
      unavailable, unknown     →  preserve (no trigger fires)

    The asymmetric off-handling is deliberate.  For guest units (e.g.
    a guest-room heat pump), climate=off cleanly maps to mode=off:
    the unit is genuinely idle when no guests are present.  For
    standard units (the main heating system), climate=off may be
    transient — automation pause, brief modulation, short user
    intervention — and flipping the mode helper to off cancels
    Heating Analytics learning for the period.  MODE_OFF is reserved
    for units the user explicitly disabled (matches the rationale
    in the heat_pump_mode_sync.yaml blueprint).  Users who DO want
    standard climate=off to stop tracking can manually set the
    select to off via the UI.

    Behaviour change from v1 (1.3.4 and earlier):
      - climate=off on standard units no longer silently sets mode=off.
      - heat_cool and auto now route to heating instead of off.
      - dry and fan_only now preserve (they were silently set to off).

    See blueprints/MIGRATION.md for the upgrade guide.

  domain: automation

  source_url: https://github.com/thuemah/heating_analytics/blob/main/blueprints/climate_sync.yaml

  input:
    climate_entity:
      name: Climate Entity
      description: The climate entity to monitor for state changes
      selector:
        entity:
          domain: climate

    mode_helper:
      name: Mode Helper Entity
      description: The Heating Analytics select helper to update
      selector:
        entity:
          domain: select

    use_guest_prefix:
      name: Use Guest Mode Prefix
      description: >
        Enable for guest-room units. Heating/cooling states get prefixed
        with 'guest_' so consumption is bucketed separately, and climate=off
        sets the mode helper to off (guest left).  Disable for the main
        heating system; off-states then preserve the current mode helper
        rather than auto-disabling tracking on transient off-states.
      default: false
      selector:
        boolean:

# Use queued mode to handle rapid state changes gracefully
mode: queued
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input climate_entity
    to:
      - "off"
      - "heat"
      - "cool"
      - "heat_cool"
      - "auto"
      - "dry"
      - "fan_only"
#      - "unavailable" # beholder da sin siste status
#      - "unknown"     # beholder da sin siste status

variables:
  # Load the boolean input into a variable for robust access in templates
  _use_guest_prefix: !input use_guest_prefix
  # Calculate prefix based on guest mode setting
  prefix: "{{ 'guest_' if _use_guest_prefix else '' }}"
  hvac_state: "{{ trigger.to_state.state }}"

action:
  - choose:
      # Active heating intent: explicit heat, plus auto / heat_cool where
      # the climate device decides between heat/cool but heating is the
      # dominant intent for installations using this integration.
      - conditions:
          - "{{ hvac_state in ['heat', 'auto', 'heat_cool'] }}"
        sequence:
          - service: select.select_option
            target:
              entity_id: !input mode_helper
            data:
              option: "{{ prefix ~ 'heating' }}"

      # Active cooling intent.
      - conditions:
          - "{{ hvac_state == 'cool' }}"
        sequence:
          - service: select.select_option
            target:
              entity_id: !input mode_helper
            data:
              option: "{{ prefix ~ 'cooling' }}"

      # Climate=off — guest-mode-only branch.  Standard units fall
      # through to the no-op default to preserve their current mode
      # helper state (see blueprint description).
      - conditions:
          - "{{ hvac_state == 'off' and _use_guest_prefix }}"
        sequence:
          - service: select.select_option
            target:
              entity_id: !input mode_helper
            data:
              option: "off"

    # Default: do nothing.  Covers:
    #   - dry / fan_only (small load, neither heating nor cooling — let
    #     the per-unit base bucket absorb whatever consumption appears).
    #   - climate=off on standard units (preserve — MODE_OFF is for
    #     deliberate user disable, not transient automation/modulation).
    # The mode helper is unchanged; live learning continues against the
    # most recently set mode.
    default: []
